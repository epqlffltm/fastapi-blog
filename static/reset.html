<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비밀번호 재설정 · blog</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">blog</a>
            <nav></nav>
        </div>
    </header>

    <main class="container">
        <!-- 1단계: 코드 요청 -->
        <section id="step-request">
            <h1>비밀번호 재설정</h1>
            <form id="request-form">
                <div class="field">
                    <label for="email">가입한 이메일</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <p class="error" id="request-error"></p>
                <button type="submit" class="primary" id="request-submit">코드 받기</button>
            </form>
            <p class="hint"><a href="/login">로그인으로 돌아가기</a></p>
        </section>

        <!-- 2단계: 코드 + 새 비번 -->
        <section id="step-verify" hidden>
            <h1>새 비밀번호 설정</h1>
            <p class="notice" id="verify-notice"></p>
            <form id="verify-form">
                <div class="field">
                    <label for="otp">인증 코드 (6자리)</label>
                    <input type="text" id="otp" class="code" required
                        inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                        autocomplete="one-time-code">
                </div>
                <div class="field">
                    <label for="new-password">새 비밀번호 (8자 이상)</label>
                    <input type="password" id="new-password" required
                        minlength="8" maxlength="72" autocomplete="new-password">
                </div>
                <p class="error" id="verify-error"></p>
                <button type="submit" class="primary" id="verify-submit">변경</button>
            </form>
        </section>

        <!-- 3단계: 완료 -->
        <section id="step-done" hidden>
            <h1>변경 완료</h1>
            <p class="notice">비밀번호가 바뀌었습니다. 새 비밀번호로 로그인하세요.</p>
            <p class="hint"><a href="/login">로그인하기</a></p>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/reset.js"></script>
</body>
</html>
