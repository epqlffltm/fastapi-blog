<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>글쓰기 · blog</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">blog</a>
            <nav></nav>
        </div>
    </header>

    <main class="container">
        <h1>글쓰기</h1>

        <form id="write-form" class="wide" hidden>
            <div class="field">
                <label for="category">분류</label>
                <select id="category" required></select>
            </div>
            <div class="field">
                <label for="title">제목</label>
                <input type="text" id="title" required maxlength="200">
            </div>
            <div class="field">
                <label>본문</label>
                <div id="editor"></div>
                <p class="hint">이미지는 툴바 버튼, 드래그, 붙여넣기로 넣을 수 있습니다.</p>
            </div>
            <p class="error" id="error"></p>
            <button type="submit" class="primary" id="submit">등록</button>
        </form>

        <p class="empty" id="guard">확인 중…</p>
    </main>

    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/i18n/ko-kr.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/post-form.js"></script>
    <script src="/js/write.js"></script>
</body>
</html>
