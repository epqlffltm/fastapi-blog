<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>글쓰기 · blog</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">blog</a>
            <nav></nav>
        </div>
    </header>

    <main class="container">
        <h1>글쓰기</h1>

        <form id="write-form" class="wide" hidden>
            <div class="field">
                <label for="category">분류</label>
                <select id="category" required></select>
            </div>
            <div class="field">
                <label for="title">제목</label>
                <input type="text" id="title" required maxlength="200">
            </div>
            <div class="field">
                <label for="contents">본문</label>
                <textarea id="contents" required></textarea>
            </div>
            <div class="field">
                <label for="images">이미지 주소 (한 줄에 하나, 선택)</label>
                <textarea id="images" placeholder="https://example.com/a.jpg"></textarea>
            </div>
            <p class="error" id="error"></p>
            <button type="submit" class="primary" id="submit">등록</button>
        </form>

        <p class="empty" id="guard">확인 중…</p>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/write.js"></script>
</body>
</html>
